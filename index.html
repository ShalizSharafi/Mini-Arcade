<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Games</title>
       <link rel="stylesheet" href="stylesheet/out.css">
</head>
<body>
       <header class="row p-5 lg:p-10  bg-background  *:text-start *:w-full relative ">
              <h2 class="text-white font-bold  capitalize text-2xl sm:text-3xl  ">mini arcade</h2>
              <p class=" text-header-subtitle  mt-2.5 ">Pick a game from the menu to play</p>
              <nav class="w-full mt-10 sm:mt-5 z-10">
                     <ul class="row justify-start lg:justify-start *:text-nav-active-text gap-5">
                            <li class="navItem" data-status="off"> 
                                   <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" stroke-width="2" stroke="#1a1a2e" class="size-5">
  <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
</svg>

                                   number guesser</li>
                            <li class="navItem" data-status="off">  
                                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" stroke-width="2"  class="size-5"><path d="M5 5L5 19H19V5H5ZM3 5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5ZM12 14C13.1046 14 14 13.1046 14 12C14 10.8954 13.1046 10 12 10C10.8954 10 10 10.8954 10 12C10 13.1046 10.8954 14 12 14Z"></path></svg>
                           dice roller </li>
                            <li class="navItem" data-status="off">
                                   <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" class="size-5 fill-white">
  <text x="1" y="9" font-size="7" font-weight="900" class="fill-white" transform="rotate(-15, 1, 9)">A</text>
  <text x="7" y="14" font-size="9" font-weight="900" class="fill-white" transform="rotate(10, 7, 14)">B</text>
  <text x="13" y="8" font-size="6" font-weight="900" class="fill-white" transform="rotate(-20, 13, 8)">C</text>
  <text x="4" y="18" font-size="5" font-weight="900" class="fill-white" transform="rotate(25, 4, 18)">Z</text>
  <text x="11" y="18" font-size="7" font-weight="900" class="fill-white" transform="rotate(-10, 11, 18)">W</text>
</svg>
                                   word scramble</li>
                                   <li class="navItem" data-status="off">
                                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" class="size-5">
  <!-- grid lines -->
  <line x1="7" y1="1" x2="7" y2="19" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="1" x2="13" y2="19" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1" y1="7" x2="19" y2="7" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1" y1="13" x2="19" y2="13" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- X top left -->
  <line x1="2.5" y1="2.5" x2="5.5" y2="5.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5.5" y1="2.5" x2="2.5" y2="5.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- O top middle -->
  <circle cx="10" cy="4" r="1.8" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- X middle right -->
  <line x1="14.5" y1="8.5" x2="17.5" y2="11.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17.5" y1="8.5" x2="14.5" y2="11.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- O bottom middle -->
  <circle cx="10" cy="16" r="1.8" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- X center -->
  <line x1="8.5" y1="8.5" x2="11.5" y2="11.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11.5" y1="8.5" x2="8.5" y2="11.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
</svg>
                                          Tic Tac Toe</li>
                     </ul>
              </nav>
              <div class="absolute top-0 right-0 w-1/2 h-full">
                     <img src="images/svg (2).png" alt="" class="w-full h-full object-cover">
              </div>
       </header>

       <!-- game section /////////////////////////////////////////////////// -->
  <section class="w-full bg-background py-2.5 px-5 lg:px-10 ">
       <!-- //arcade -->
       <div class="arcade w-full text-white">
              <!-- //number gusser game -->
              <div class="numberGuesserBox gameBox gap-5" data-status="off">
                      <h3 class="w-full flex items-center justify-center text-background font-bold capitalize sm:text-2xl  animate-bounce">choose a number between 0 to 100 and hit the play  button.</h3>
      <input type="text" name="" id="inp" class="w-full px-2.5 sm:w-1/4 grow bg-nav-active-bg text-white py-2 rounded-[10px] outline-none border-none  ">
      <button class="buttonStyle play">play</button>
      <button class="buttonStyle again">try again</button>
              </div>
               <!-- //number gusser game -->

              <!-- rolling dice game  /////////////////////////////////////////// -->
               <div class="diceRollerBox gameBox" data-status="off">
                     
                     <div class="row justify-center items-center">
                            <h3 class="w-full flex items-center justify-center text-background font-bold capitalize sm:text-2xl  animate-bounce gap-1.5 "> 
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#1a1a2e" stroke-width="2"  class="size-6"><path d="M5 5L5 19H19V5H5ZM3 5C3 3.89543 3.89543 3 5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5ZM12 14C13.1046 14 14 13.1046 14 12C14 10.8954 13.1046 10 12 10C10.8954 10 10 10.8954 10 12C10 13.1046 10.8954 14 12 14Z"></path></svg>
                                   Roll the dice to play</h3>
                              <p class=" text-header-subtitle  mt-2.5 capitalize">first to 50 wins</p>
                     </div>
                     <div class="row mt-7.5 gap-10 justify-center">
                            <div class="dice cursor-pointer">
                                   <span class="diceSpans bg-player-one-chip-bg translate-z-7.5 text-background text-xl font-bold">1</span>
                                   <span class="diceSpans bg-player-one-chip-bg -translate-z-7.5 text-background text-xl font-bold">2</span>
                                   <span class="diceSpans bg-player-one-chip-bg  origin-right translate-z-7.5 text-background text-xl font-bold -rotate-y-90">3</span>
                                   <span class="diceSpans bg-player-one-chip-bg origin-left -translate-z-7.5 text-background text-xl font-bold -rotate-y-90">4</span>
                                   <span class="diceSpans bg-player-one-chip-bg origin-top translate-z-7.5 text-background text-xl font-bold -rotate-x-90">5</span>
                                   <span class="diceSpans bg-player-one-chip-bg origin-bottom -translate-z-7.5 text-background text-xl font-bold -rotate-x-90">6</span>
                            </div>
                            <div class="row gap-5">
                                   <button  class="buttonStyle rollButtons bg-player-one-chip-bg">
                                          <span class="text-xl w-full flex items-center justify-center font-normal text-player-one-label">player 1</span>
                                          <span class=" font-bold text-player-one-score score text-xl ">score</span>
                                   </button>
                                   <button  class="buttonStyle rollButtons bg-player-two-chip-bg!">
                                          <span class="text-xl w-full flex items-center justify-center  font-normal text-player-two-label!">player 2</span>
                                          <span class="text-xl font-bold text-player-two-score score">score</span>
                                   </button>
                                     <button  class="buttonStyle holdButtons bg-background">
                                          <span class="text-xl w-full flex items-center justify-center font-bold text-player-one-label">player1 hold</span>
                                   </button>
                                   <button  class="buttonStyle holdButtons bg-background!">
                                          <span class="text-xl w-full flex items-center justify-center  font-bold text-player-two-label!">player2 hold</span>
                                   </button>
                            </div>
                     </div>
               </div>
               <!-- ////rolling dice game done ///////////////////////////////////////////// -->


              <!-- word scramble game  /////////////////////////////////////////// -->
               <div class="wordScrambleBox gameBox">
                     <div class="row justify-center items-center">
                            <span class=" text-background font-bold  capitalize text-center  sm:text-2xl animate-bounce">what's your guess? type it out.</span>
                     </div>
                     <div class="row lettersRow justify-center items-center gap-2.5">
                           <!-- letters come here -->
                     </div>
                     <div class="row justify-center items-center">
                            <input type="text" name="inp" id="inp">
                     </div>
                     <div class="w-full flex flex-wrap md:flex-nowrap gap-2.5 justify-center items-center ">
                          <button class="buttonStyle md:w-1/4 md:grow-0">guess</button>
                          <button class="buttonStyle md:w-1/4 md:grow-0">new word</button> 
                     </div>
               </div>

               <!-- tic tak toe game -->
                <!-- <div class="wordScrambleBox gameBox">

               </div> -->
       </div>
  </section>
</body>
<script src="js/master.js"></script>
</html>
