<!DOCTYPE html>
<html lang="en">
<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Games</title>
       <link rel="stylesheet" href="stylesheet/out.css">
</head>
<body>
       <header class="row p-5 lg:p-10  bg-background  *:text-start *:w-full ">
              <h2 class="text-white font-bold  capitalize text-2xl  ">mini arcade</h2>
              <p class=" text-header-subtitle  mt-2.5 ">pick a gam efrom the menu to play</p>
              <nav class="w-full mt-10 sm:mt-5">
                     <ul class="row justify-start lg:justify-start *:text-nav-active-text gap-5">
                            <li class="navItem">number guesser</li>
                            <li class="navItem">dice roller</li>
                            <li class="navItem">word scramble</li>
                     </ul>
              </nav>
       </header>
  <section class="row bg-background p-5 lg:p-10 ">
       <div class="w-full  hidden">
             <!-- create an account -->
       </div>
       <!-- //arcade -->
       <div class="arcade row mt-10 justify-center items-center text-white">
              <!-- //number gusser game -->
              <div class="numberGuesserBox gameBox gap-5" data-status="off">
                      <h3 class="w-full flex items-center justify-center text-background font-bold capitalize md:text-xl  animate-bounce">choose a number between 0 to 100 and hit the play  button.</h3>
      <input type="text" name="" id="inp" class="w-full px-2.5 sm:w-1/4 grow bg-nav-active-bg text-white py-2 rounded-[10px] outline-none border-none  ">
      <button class="buttonStyle">play</button>
      <button class="buttonStyle">try again</button>
              </div>
               <!-- //number gusser game -->


               <!-- <div class="numberGeusser gameBox"></div> -->
               <!-- <div class="numberGeusser gameBox"></div> -->
       </div>
  </section>
</body>
<script src="js/master.js"></script>
</html>
